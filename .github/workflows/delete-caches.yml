name: delete-caches
run-name: Delete all Actions caches by @${{ github.actor }}

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: delete-actions-caches
  cancel-in-progress: false

jobs:
  delete-caches:
    runs-on: ubuntu-latest

    steps:
      - name: Delete all GitHub Actions caches
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          mapfile -t cache_ids < <(
            gh api --paginate \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${REPO}/actions/caches?per_page=100" \
              --jq '.actions_caches[].id'
          )

          if [ "${#cache_ids[@]}" -eq 0 ]; then
            echo "No GitHub Actions caches found."
            exit 0
          fi

          echo "Deleting ${#cache_ids[@]} GitHub Actions cache(s)."

          for cache_id in "${cache_ids[@]}"; do
            echo "Deleting cache ${cache_id}"
            gh api --method DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${REPO}/actions/caches/${cache_id}" >/dev/null
          done

          echo "Deleted ${#cache_ids[@]} GitHub Actions cache(s)."
